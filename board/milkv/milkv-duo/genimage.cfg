image boot.vfat {
	vfat {
		label = "boot"
		files = {
			"duo-firmware/fip.bin",
			"duo-firmware/boot.sd",
		}
	}
	size = 128M
}

image sd.img {
	hdimage {
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
                image = "boot.vfat"
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
